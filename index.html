<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>InspectSafe</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><div class="no-print"><h1>InspectSafe</h1><div class="sub">HSE Inspection & SHO Reporting System</div><label>Company / Site</label><input id="company" type="text" value="Linocraft Printers Sdn. Bhd."><div class="row"><div><label>Inspection Date</label><input id="inspectionDate" type="date"></div><div><label>Month for SHO Report</label><input id="reportMonth" type="month"></div></div><label>Location</label><select id="location"><option>Block A</option><option>Block B</option><option>Block C</option><option>Block D</option><option>Block E</option><option>Warehouse</option><option>Printing</option><option>Facility</option><option>Loading Bay</option><option>Chemical Store</option><option>Other</option></select><label>Category</label><select id="category"><option>Housekeeping</option><option>Fire Safety</option><option>Chemical Safety</option><option>Forklift Safety</option><option>Electrical Safety</option><option>Machine Safety</option><option>Environment</option><option>Emergency Preparedness</option><option>Other</option></select><label>Finding / Concern</label><textarea id="finding"></textarea><label>Recommendation / Action Plan</label><textarea id="action"></textarea><div class="row"><div><label>PIC / Department</label><input id="pic" type="text"></div><div><label>Due Date</label><input id="due" type="date"></div></div><label>Status</label><select id="status"><option>Open</option><option>In Progress</option><option>Closed</option></select><label>Photo</label><div class="row"><input id="camera" type="file" accept="image/*" capture="environment"><input id="gallery" type="file" accept="image/*" multiple></div><div class="small">Left: Camera | Right: Gallery (up to 4 photos)</div><div id="photoPreviewWrap" class="photo-grid"></div><button class="save" onclick="saveRecord()">SAVE FINDING</button><button class="export" onclick="exportCSV()">EXPORT MASTER DATA CSV</button><button class="report" onclick="generateWorkplaceReport()">GENERATE WORKPLACE INSPECTION REPORT</button><button class="report" onclick="generateSHOReport()">GENERATE SHO MONTHLY REPORT</button><button class="clear" onclick="clearAll()">CLEAR ALL RECORDS</button></div><div id="cloudStatus" class="small">Connecting to Firestore...</div><div id="output"><h2>Saved Records</h2><div id="summary" class="small"></div><div id="records"></div></div></div><script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-app-compat.js"></script>
