<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InspectSafe v2</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <div>
    <h1>InspectSafe</h1>
    <p>Inspect Once. Report Automatically.</p>
  </div>
  <span class="version">v2.0 Alpha</span>
</header>

<nav>
  <button onclick="showView('dashboard')">Dashboard</button>
  <button onclick="showView('inspection')">New Inspection</button>
  <button onclick="showView('records')">Findings</button>
  <button onclick="generateWorkplaceReport()">Workplace Report</button>
  <button onclick="generateSHOReport()">SHO Monthly</button>
</nav>

<main>
<section id="dashboard" class="view active">
  <h2>Dashboard</h2>
  <div class="stats">
    <div class="stat"><b id="totalCount">0</b><span>Total Findings</span></div>
    <div class="stat"><b id="openCount">0</b><span>Open</span></div>
    <div class="stat"><b id="progressCount">0</b><span>In Progress</span></div>
    <div class="stat"><b id="closedCount">0</b><span>Closed</span></div>
    <div class="stat"><b id="overdueCount">0</b><span>Overdue</span></div>
  </div>
  <div class="panel">
    <h3>Quick Action</h3>
    <button class="primary" onclick="showView('inspection')">+ New Inspection</button>
  </div>
</section>

<section id="inspection" class="view">
  <h2>New Inspection</h2>

  <div class="grid">
    <label>Inspection Date
      <input id="inspectionDate" type="date">
    </label>

    <label>Location
      <select id="location">
        <option>Block A</option><option>Block B</option><option>Block C</option>
        <option>Block D</option><option>Block E</option><option>Warehouse</option>
        <option>Printing</option><option>Facility</option><option>Loading Bay</option>
        <option>Chemical Store</option><option>Other</option>
      </select>
    </label>
  </div>

  <div class="grid">
    <label>Department
      <input id="department" placeholder="Example: Facility / Printing">
    </label>

    <label>Category
      <select id="category">
        <option>Housekeeping</option><option>Fire Safety</option><option>Chemical Safety</option>
        <option>Electrical Safety</option><option>Machine Safety</option><option>Forklift Safety</option>
        <option>Environment</option><option>Emergency Preparedness</option><option>Other</option>
      </select>
    </label>
  </div>

  <label>Finding / Concern
    <textarea id="finding" placeholder="Describe the unsafe condition or concern."></textarea>
  </label>

  <label>Recommendation / Action Plan
    <textarea id="action" placeholder="Describe the required corrective action."></textarea>
  </label>

  <div class="grid">
    <label>Risk Level
      <select id="risk">
        <option>Low</option><option selected>Medium</option><option>High</option>
      </select>
    </label>

    <label>Status
      <select id="status">
        <option>Open</option><option>In Progress</option><option>Closed</option>
      </select>
    </label>
  </div>

  <div class="grid">
    <label>PIC Name / Department
      <input id="pic" placeholder="Example: Facility - Hisyam">
    </label>

    <label>PIC WhatsApp Number
      <input id="phone" inputmode="numeric" placeholder="Example: 60123456789">
    </label>
  </div>

  <div class="grid">
    <label>Due Date
      <input id="dueDate" type="date">
    </label>

    <label>Photo
      <input id="photo" type="file" accept="image/*">
    </label>
  </div>

  <img id="preview" class="preview hidden" alt="Photo preview">

  <div class="actions">
    <button class="primary" onclick="saveFinding()">Save Finding</button>
    <button class="whatsapp" onclick="sendCurrentToWhatsApp()">Open WhatsApp</button>
  </div>
</section>

<section id="records" class="view">
  <h2>Saved Findings</h2>
  <div class="filters">
    <input id="search" placeholder="Search finding, PIC or location" oninput="renderRecords()">
    <select id="filterStatus" onchange="renderRecords()">
      <option value="">All Status</option>
      <option>Open</option><option>In Progress</option><option>Closed</option>
    </select>
  </div>
  <div id="recordsList"></div>
</section>

<section id="report" class="view">
  <div id="reportContent"></div>
</section>
</main>

<script src="app.js"></script>
</body>
</html>
